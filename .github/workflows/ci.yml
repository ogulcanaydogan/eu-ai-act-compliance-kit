name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Format check with black
        run: black --check src/ tests/

      - name: Type check with mypy
        run: mypy src/eu_ai_act/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    name: Test (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=src/eu_ai_act --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  quickstart-smoke:
    runs-on: ubuntu-latest
    name: Quickstart Smoke
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run one-command quickstart smoke
        run: |
          ./scripts/quickstart_smoke.sh examples/medical_diagnosis.yaml /tmp/quickstart-smoke
          test -f /tmp/quickstart-smoke/classify.json
          test -f /tmp/quickstart-smoke/check.json
          test -f /tmp/quickstart-smoke/report.json
          test -f /tmp/quickstart-smoke/report.html

  examples-smoke:
    runs-on: ubuntu-latest
    name: Examples Smoke
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate examples classify/check contracts
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          examples = sorted(Path("examples").glob("*.yaml"))
          system_examples = [p for p in examples if not p.name.startswith("gpai_model")]
          gpai_examples = [p for p in examples if p.name.startswith("gpai_model")]

          if not system_examples:
              raise SystemExit("No system examples found.")

          for descriptor in system_examples:
              subprocess.run(
                  ["ai-act", "validate", str(descriptor)],
                  check=True,
                  stdout=subprocess.DEVNULL,
              )

              classify = subprocess.run(
                  ["ai-act", "classify", str(descriptor), "--json"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              classify_payload = json.loads(classify.stdout)
              for key in ("system_name", "risk_tier", "articles_applicable"):
                  if key not in classify_payload:
                      raise SystemExit(f"{descriptor}: classify missing key: {key}")

              check = subprocess.run(
                  ["ai-act", "check", str(descriptor), "--json"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              check_payload = json.loads(check.stdout)
              summary = check_payload.get("summary")
              if not isinstance(summary, dict):
                  raise SystemExit(f"{descriptor}: check summary missing")
              for key in (
                  "total_requirements",
                  "compliant_count",
                  "non_compliant_count",
                  "partial_count",
                  "not_assessed_count",
                  "compliance_percentage",
              ):
                  if key not in summary:
                      raise SystemExit(f"{descriptor}: check.summary missing key: {key}")

          for model in gpai_examples:
              gpai = subprocess.run(
                  ["ai-act", "gpai", str(model), "--json"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              gpai_payload = json.loads(gpai.stdout)
              for key in ("model_name", "provider", "systemic_risk_flag", "findings"):
                  if key not in gpai_payload:
                      raise SystemExit(f"{model}: gpai missing key: {key}")

          print(
              f"validated {len(system_examples)} system examples and {len(gpai_examples)} gpai examples"
          )
          PY

  handoff-smoke:
    runs-on: ubuntu-latest
    name: Handoff Smoke
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run handoff command and validate artifact contract
        run: |
          mkdir -p /tmp/handoff-smoke
          ai-act handoff examples/medical_diagnosis.yaml --output-dir /tmp/handoff-smoke --json > /tmp/handoff-smoke/stdout_manifest.json
          python - <<'PY'
          import json
          from pathlib import Path

          output_dir = Path("/tmp/handoff-smoke")
          expected = [
              "validate.json",
              "classify.json",
              "check.json",
              "security_map.json",
              "checklist.json",
              "checklist.md",
              "report.html",
              "collaboration_summary.json",
              "handoff_manifest.json",
          ]
          for name in expected:
              path = output_dir / name
              if not path.exists():
                  raise SystemExit(f"handoff artifact missing: {path}")

          manifest = json.loads((output_dir / "handoff_manifest.json").read_text())
          assert manifest["status"] == "success"
          assert manifest["risk_tier"] in {"minimal", "limited", "high_risk", "unacceptable"}
          assert "compliance_summary" in manifest
          assert "security_summary" in manifest
          assert "collaboration_summary" in manifest
          assert "artifacts" in manifest
          PY

  export-ops-gate-smoke:
    runs-on: ubuntu-latest
    name: Export Ops Gate Smoke
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run export gate rollout smoke (PR observe, main/tag enforce)
        env:
          GATE_MODE: ${{ github.event_name == 'pull_request' && 'observe' || 'enforce' }}
        run: |
          mkdir -p /tmp/export-gate-smoke/.eu_ai_act
          cat > /tmp/export-gate-smoke/.eu_ai_act/export_ops_log.jsonl <<'JSONL'
          {"attempt_id":"a1","generated_at":"2026-03-23T10:00:00+00:00","target":"jira","push_mode":"create","operation":"create","result":"success","system_name":"Smoke System","idempotency_key":"k1","failure_reason":null}
          {"attempt_id":"a2","generated_at":"2026-03-23T11:00:00+00:00","target":"jira","push_mode":"create","operation":"create","result":"success","system_name":"Smoke System","idempotency_key":"k2","failure_reason":null}
          JSONL
          cat > /tmp/export-gate-smoke/.eu_ai_act/export_push_ledger.jsonl <<'JSONL'
          {"idempotency_key":"k1","target":"jira","system_name":"Smoke System","descriptor_path":"/tmp/smoke.yaml","requirement_id":"Art. 10","status":"non_compliant","remote_ref":"EUAI-1","pushed_at":"2026-03-23T11:00:00+00:00"}
          {"idempotency_key":"k2","target":"jira","system_name":"Smoke System","descriptor_path":"/tmp/smoke.yaml","requirement_id":"Art. 11","status":"partial","remote_ref":"EUAI-2","pushed_at":"2026-03-23T11:05:00+00:00"}
          JSONL
          cat > /tmp/export-gate-smoke/.eu_ai_act/export_reconcile_log.jsonl <<'JSONL'
          {"reconcile_id":"r1","generated_at":"2026-03-23T12:00:00+00:00","target":"jira","system_name":"Smoke System","requirement_id":"Art. 10","status":"exists","drift_status":"in_sync","http_status":200,"failure_reason":null,"repair_enabled":false,"apply":false}
          {"reconcile_id":"r2","generated_at":"2026-03-23T12:01:00+00:00","target":"jira","system_name":"Smoke System","requirement_id":"Art. 11","status":"exists","drift_status":"in_sync","http_status":200,"failure_reason":null,"repair_enabled":false,"apply":false}
          JSONL
          ai-act export gate --target jira --mode "$GATE_MODE" --policy config/export_ops_gate_policy.yaml --since-hours 9999 --ops-path /tmp/export-gate-smoke/.eu_ai_act/export_ops_log.jsonl --reconcile-log-path /tmp/export-gate-smoke/.eu_ai_act/export_reconcile_log.jsonl --json > /tmp/export-gate-smoke/gate.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/export-gate-smoke/gate.json").read_text())
          assert payload["mode"] in {"observe", "enforce"}
          assert payload["failed"] is False
          assert payload["reason_codes"] == []
          assert "effective_policy" in payload
          assert "rollup_metrics" in payload
          assert "reconcile_metrics" in payload
          assert "decision_details" in payload
          PY

  collaboration-smoke:
    runs-on: ubuntu-latest
    name: Collaboration Smoke
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run collaboration workflow smoke
        run: |
          mkdir -p /tmp/collaboration-smoke
          ai-act collaboration sync examples/medical_diagnosis.yaml --json > /tmp/collaboration-smoke/sync.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("/tmp/collaboration-smoke/sync.json").read_text())
          assert "summary" in payload
          assert payload["summary"]["open_count"] >= 1
          tasks = payload.get("tasks", [])
          assert tasks
          task_id = tasks[0]["task_id"]
          Path("/tmp/collaboration-smoke/task_id.txt").write_text(task_id)
          PY
          TASK_ID="$(cat /tmp/collaboration-smoke/task_id.txt)"
          ai-act collaboration update "$TASK_ID" --status in_review --note "CI smoke review" --note-author ci --json > /tmp/collaboration-smoke/update.json
          ai-act collaboration list --status in_review --json > /tmp/collaboration-smoke/list.json
          ai-act collaboration summary --json > /tmp/collaboration-smoke/summary.json
          python - <<'PY'
          import json
          from pathlib import Path
          update_payload = json.loads(Path("/tmp/collaboration-smoke/update.json").read_text())
          assert update_payload["changed"] is True
          assert update_payload["updated_task"]["workflow_status"] == "in_review"
          list_payload = json.loads(Path("/tmp/collaboration-smoke/list.json").read_text())
          assert list_payload["count"] >= 1
          summary_payload = json.loads(Path("/tmp/collaboration-smoke/summary.json").read_text())
          assert summary_payload["in_review_count"] >= 1
          assert "open_count" in summary_payload
          assert "blocked_count" in summary_payload
          assert "done_count" in summary_payload
          PY

  collaboration-gate-smoke:
    runs-on: ubuntu-latest
    name: Collaboration Gate Smoke
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run collaboration gate rollout smoke (PR observe, main/tag enforce)
        env:
          IS_MAIN_OR_TAG: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          mkdir -p /tmp/collaboration-gate-smoke/.eu_ai_act
          cat > /tmp/collaboration-gate-smoke/.eu_ai_act/collaboration_tasks.jsonl <<'JSONL'
          {"task_id":"Smoke System::Art. 10","system_name":"Smoke System","descriptor_path":"/tmp/smoke.yaml","requirement_id":"Art. 10","article":"Art. 10","title":"Data governance","finding_status":"non_compliant","severity":"HIGH","workflow_status":"open","owner":"alice","notes":[],"created_at":"2026-03-24T10:00:00+00:00","updated_at":"2026-03-24T10:00:00+00:00"}
          {"task_id":"Smoke System::Art. 11","system_name":"Smoke System","descriptor_path":"/tmp/smoke.yaml","requirement_id":"Art. 11","article":"Art. 11","title":"Documentation","finding_status":"partial","severity":"MEDIUM","workflow_status":"in_review","owner":"bob","notes":[],"created_at":"2026-03-24T10:05:00+00:00","updated_at":"2026-03-24T10:05:00+00:00"}
          JSONL
          GATE_MODE="observe"
          if [[ "${{ github.event_name }}" != "pull_request" && "$IS_MAIN_OR_TAG" == "true" ]]; then
            GATE_MODE="enforce"
          fi
          ai-act collaboration gate --mode "$GATE_MODE" --policy config/collaboration_gate_policy.yaml --stale-actionable-max 9999 --blocked-stale-max 9999 --review-stale-max 9999 --stale-after-hours 1 --blocked-stale-after-hours 1 --review-stale-after-hours 1 --collab-path /tmp/collaboration-gate-smoke/.eu_ai_act/collaboration_tasks.jsonl --json > /tmp/collaboration-gate-smoke/gate.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/collaboration-gate-smoke/gate.json").read_text())
          assert payload["mode"] in {"observe", "enforce"}
          assert payload["failed"] is False
          assert payload["reason_codes"] == []
          assert "effective_policy" in payload
          assert "metrics" in payload
          assert "decision_details" in payload
          assert payload["metrics"]["blocked_count"] == 0
          assert payload["metrics"]["unassigned_actionable_count"] == 0
          assert "stale_actionable_count" in payload["metrics"]
          assert "blocked_stale_count" in payload["metrics"]
          assert "review_stale_count" in payload["metrics"]
          assert "stale_actionable" in payload["decision_details"]
          assert "blocked_stale" in payload["decision_details"]
          assert "review_stale" in payload["decision_details"]
          assert payload["effective_policy"]["sla"]["stale_after_hours"] == 1.0
          assert payload["effective_policy"]["sla"]["blocked_stale_after_hours"] == 1.0
          assert payload["effective_policy"]["sla"]["review_stale_after_hours"] == 1.0
          PY

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [lint, test, quickstart-smoke, examples-smoke, handoff-smoke, export-ops-gate-smoke, collaboration-smoke, collaboration-gate-smoke]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [lint, test, quickstart-smoke, examples-smoke, handoff-smoke, export-ops-gate-smoke, collaboration-smoke, collaboration-gate-smoke]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: eu-ai-act-compliance-kit:${{ github.sha }}

  docs:
    runs-on: ubuntu-latest
    name: Build Documentation
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build

  security:
    runs-on: ubuntu-latest
    name: Security Check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run security check
        run: bandit -r src/

  action-smoke:
    runs-on: ubuntu-latest
    name: Action Smoke
    needs: [lint, test, quickstart-smoke, examples-smoke, handoff-smoke, export-ops-gate-smoke, collaboration-smoke, collaboration-gate-smoke]
    steps:
      - uses: actions/checkout@v6

      - name: Minimal-risk scenario should pass
        id: minimal
        uses: ./
        with:
          system_yaml: examples/spam_filter.yaml
          fail_on_high_risk: "true"
          security_gate_mode: "observe"
          security_gate_profile: "balanced"
          export_ops_gate_mode: "observe"
          export_ops_gate_target: "jira"
          report_format: json
          report_path: minimal_report.json

      - name: Validate minimal-risk action outputs
        run: |
          test "${{ steps.minimal.outputs.risk_tier }}" = "minimal"
          test "${{ steps.minimal.outputs.non_compliant_count }}" = "0"
          test "${{ steps.minimal.outputs.security_non_compliant_count }}" = "0"
          test "${{ steps.minimal.outputs.security_partial_count }}" = "0"
          [[ "${{ steps.minimal.outputs.security_not_assessed_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.export_ops_gate_failed }}" =~ ^(true|false)$ ]]
          [[ "${{ steps.minimal.outputs.export_ops_open_failures_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.export_ops_drift_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_open_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_in_review_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_blocked_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_done_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_unassigned_actionable_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_stale_actionable_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_blocked_stale_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_review_stale_count }}" =~ ^[0-9]+$ ]]
          [[ "${{ steps.minimal.outputs.collaboration_gate_failed }}" =~ ^(true|false)$ ]]
          test -f minimal_report.json

      - name: Create high-risk non-compliant fixture
        run: |
          cat > /tmp/high_risk_noncompliant.yaml <<'YAML'
          name: "CI Gate Hiring Assistant"
          version: "0.1.0"
          description: "Automated employment screening model for applicant ranking."
          use_cases:
            - domain: employment
              description: "Ranks applicants for hiring decisions without human intervention."
              autonomous_decision: true
              impacts_fundamental_rights: true
          data_practices:
            - type: personal
              retention_period: 365
              sharing_third_parties: false
              explicit_consent: false
          human_oversight:
            oversight_mechanism: "none"
            fallback_procedure: "No fallback process is currently defined."
            review_frequency: "never"
            human_authority: false
          training_data_source: "Historical applicant data from prior recruitment cycles."
          documentation: false
          performance_monitoring: false
          YAML

      - name: High-risk non-compliant scenario should fail gate
        id: highrisk
        continue-on-error: true
        uses: ./
        with:
          system_yaml: /tmp/high_risk_noncompliant.yaml
          fail_on_high_risk: "true"
          report_format: json
          report_path: high_risk_report.json

      - name: Assert high-risk gate failure
        run: |
          if [[ "${{ steps.highrisk.outcome }}" != "failure" ]]; then
            echo "Expected high-risk non-compliant gate failure"
            exit 1
          fi

      - name: Security gate enforce mode should fail on non-compliant controls
        id: securitygate
        continue-on-error: true
        uses: ./
        with:
          system_yaml: /tmp/high_risk_noncompliant.yaml
          fail_on_high_risk: "false"
          security_gate_mode: "enforce"
          security_gate_profile: "balanced"
          report_format: json
          report_path: security_gate_report.json

      - name: Assert security gate enforcement failure
        run: |
          if [[ "${{ steps.securitygate.outcome }}" != "failure" ]]; then
            echo "Expected security-gate enforce mode failure"
            exit 1
          fi

      - name: Create collaboration gate enforce policy fixture
        run: |
          cat > /tmp/collaboration_gate_policy_enforce.yaml <<'YAML'
          mode: enforce
          window:
            limit: 200
          thresholds:
            blocked_max: 0
            unassigned_actionable_max: 0
            stale_actionable_max: 9999
            blocked_stale_max: 9999
          sla:
            stale_after_hours: 1
            blocked_stale_after_hours: 1
          YAML

      - name: Collaboration gate enforce mode should fail on unassigned actionable tasks
        id: collaborationgate
        continue-on-error: true
        uses: ./
        with:
          system_yaml: examples/medical_diagnosis.yaml
          fail_on_high_risk: "false"
          security_gate_mode: "observe"
          export_ops_gate_mode: "observe"
          collaboration_gate_mode: "enforce"
          collaboration_gate_policy_path: /tmp/collaboration_gate_policy_enforce.yaml
          report_format: json
          report_path: collaboration_gate_report.json

      - name: Assert collaboration gate enforcement failure
        run: |
          if [[ "${{ steps.collaborationgate.outcome }}" != "failure" ]]; then
            echo "Expected collaboration-gate enforce mode failure"
            exit 1
          fi

  all-checks:
    runs-on: ubuntu-latest
    name: All Checks Passed
    needs: [lint, test, quickstart-smoke, examples-smoke, handoff-smoke, export-ops-gate-smoke, collaboration-smoke, collaboration-gate-smoke, build, docker, docs, security, action-smoke]
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.test.result }}" == "failure" || "${{ needs.quickstart-smoke.result }}" == "failure" || "${{ needs.examples-smoke.result }}" == "failure" || "${{ needs.handoff-smoke.result }}" == "failure" || "${{ needs.export-ops-gate-smoke.result }}" == "failure" || "${{ needs.collaboration-smoke.result }}" == "failure" || "${{ needs.collaboration-gate-smoke.result }}" == "failure" || "${{ needs.build.result }}" == "failure" || "${{ needs.docker.result }}" == "failure" || "${{ needs.action-smoke.result }}" == "failure" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
