name: Maintenance Weekly

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Maintenance closeout mode override"
        required: false
        default: observe
        type: choice
        options:
          - observe
          - enforce

jobs:
  maintenance-weekly:
    runs-on: ubuntu-latest
    name: Maintenance Weekly
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"

      - name: Run maintenance suite
        id: maintenance
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          mkdir -p /tmp/maintenance-weekly/logs /tmp/maintenance-weekly/out

          MODE="observe"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$INPUT_MODE" ]]; then
            MODE="$INPUT_MODE"
          fi

          set +e
          uv run pytest -q 2>&1 | tee /tmp/maintenance-weekly/logs/pytest.log
          PYTEST_EXIT=${PIPESTATUS[0]}

          uv run mypy src/eu_ai_act 2>&1 | tee /tmp/maintenance-weekly/logs/mypy.log
          MYPY_EXIT=${PIPESTATUS[0]}

          uv run mkdocs build --strict 2>&1 | tee /tmp/maintenance-weekly/logs/mkdocs.log
          MKDOCS_EXIT=${PIPESTATUS[0]}

          uv run --with bandit bandit -r src/eu_ai_act 2>&1 | tee /tmp/maintenance-weekly/logs/bandit.log
          BANDIT_EXIT=${PIPESTATUS[0]}

          ai-act ops closeout \
            --policy config/ops_closeout_policy.yaml \
            --resolve-latest-release \
            --escalation-pack \
            --mode "$MODE" \
            --output-dir /tmp/maintenance-weekly/out \
            --json > /tmp/maintenance-weekly/logs/ops_closeout_stdout.json 2> /tmp/maintenance-weekly/logs/ops_closeout_stderr.log
          CLOSEOUT_EXIT=$?
          set -e

          export MODE PYTEST_EXIT MYPY_EXIT MKDOCS_EXIT BANDIT_EXIT CLOSEOUT_EXIT

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          checks = {
              "pytest": int(os.environ["PYTEST_EXIT"]),
              "mypy": int(os.environ["MYPY_EXIT"]),
              "mkdocs": int(os.environ["MKDOCS_EXIT"]),
              "bandit": int(os.environ["BANDIT_EXIT"]),
              "ops_closeout": int(os.environ["CLOSEOUT_EXIT"]),
          }
          overall_exit = 0 if all(code == 0 for code in checks.values()) else 1
          payload = {
              "mode": os.environ["MODE"],
              "checks": checks,
              "overall_exit_code": overall_exit,
          }
          Path("/tmp/maintenance-weekly/maintenance_results.json").write_text(
              json.dumps(payload, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(payload))
          PY

          OVERALL_EXIT_CODE="$(python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/maintenance-weekly/maintenance_results.json').read_text())
          print(payload['overall_exit_code'])
          PY
          )"

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "overall_exit_code=$OVERALL_EXIT_CODE" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build maintenance summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_lines = ["## Maintenance Weekly Summary"]
          results_path = Path("/tmp/maintenance-weekly/maintenance_results.json")
          manifest_path = Path("/tmp/maintenance-weekly/out/ops_closeout_manifest.json")

          if results_path.exists():
              results = json.loads(results_path.read_text(encoding="utf-8"))
              summary_lines.append(f"- mode: {results.get('mode')}")
              summary_lines.append(f"- overall_exit_code: {results.get('overall_exit_code')}")
              checks = results.get("checks", {})
              summary_lines.append(f"- pytest_exit: {checks.get('pytest')}")
              summary_lines.append(f"- mypy_exit: {checks.get('mypy')}")
              summary_lines.append(f"- mkdocs_exit: {checks.get('mkdocs')}")
              summary_lines.append(f"- bandit_exit: {checks.get('bandit')}")
              summary_lines.append(f"- ops_closeout_exit: {checks.get('ops_closeout')}")
          else:
              summary_lines.append("- maintenance_results: missing")

          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              summary_lines.append(f"- closeout_failed: {manifest.get('failed')}")
              summary_lines.append(
                  "- closeout_reason_codes: "
                  + (", ".join(manifest.get("reason_codes", [])) or "none")
              )
              summary_lines.append(
                  "- closeout_effective_reason_codes: "
                  + (", ".join(manifest.get("effective_reason_codes", [])) or "none")
              )
          else:
              summary_lines.append("- closeout_manifest: missing")

          Path("maintenance_weekly_summary.md").write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )
          PY
          cat maintenance_weekly_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-weekly-evidence
          path: |
            /tmp/maintenance-weekly/logs/pytest.log
            /tmp/maintenance-weekly/logs/mypy.log
            /tmp/maintenance-weekly/logs/mkdocs.log
            /tmp/maintenance-weekly/logs/bandit.log
            /tmp/maintenance-weekly/logs/ops_closeout_stdout.json
            /tmp/maintenance-weekly/logs/ops_closeout_stderr.log
            /tmp/maintenance-weekly/maintenance_results.json
            /tmp/maintenance-weekly/out/ops_closeout_checks.json
            /tmp/maintenance-weekly/out/ops_closeout_manifest.json
            /tmp/maintenance-weekly/out/ops_closeout_evidence.md
            /tmp/maintenance-weekly/out/ops_closeout_escalation.json
            /tmp/maintenance-weekly/out/ops_closeout_escalation.md
            maintenance_weekly_summary.md
          if-no-files-found: warn

      - name: Enforce maintenance suite result
        if: always()
        run: |
          if [[ "${{ steps.maintenance.outputs.overall_exit_code }}" != "0" ]]; then
            echo "Maintenance suite failed (mode=${{ steps.maintenance.outputs.mode }})"
            exit "${{ steps.maintenance.outputs.overall_exit_code }}"
          fi
