name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  qa-build:
    name: QA + Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Run tests
        run: pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [qa-build]
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/eu-ai-act-compliance-kit
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate release notes body
        run: |
          {
            echo "## Release ${{ github.ref_name }}"
            echo
            echo "- Published to PyPI via trusted publishing"
            echo "- Distribution artifacts attached (wheel + sdist)"
            echo
            echo "See CHANGELOG.md for detailed changes."
          } > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md
            gh release upload "${{ github.ref_name }}" dist/* --clobber
          else
            gh release create "${{ github.ref_name }}" dist/* \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md
          fi
