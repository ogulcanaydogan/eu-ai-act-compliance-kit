name: Bug report
description: Report a reproducible bug in EU AI Act Compliance Kit
title: "bug: <short summary>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide enough detail to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Clear description of the problem
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact commands, input files, and environment details
      placeholder: |
        1. Run ...
        2. Use ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output/logs
      description: Paste command output, stack traces, or CI links
      render: shell
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
