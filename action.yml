name: "EU AI Act Compliance Check"
description: "Automated compliance assessment for EU AI Act (2024/1689)"

inputs:
  system_yaml:
    description: "Path to AI system descriptor YAML file"
    required: true
  fail_on_high_risk:
    description: "Fail workflow when high-risk systems have non-compliant requirements"
    required: false
    default: "false"
  security_gate_mode:
    description: "Security gate mode (observe or enforce)"
    required: false
    default: "observe"
  report_format:
    description: "Report output format (json, md, html)"
    required: false
    default: "json"
  report_path:
    description: "Path to save generated report"
    required: false
    default: "compliance_report.json"

outputs:
  risk_tier:
    description: "Assigned risk tier (minimal, limited, high_risk, unacceptable)"
    value: ${{ steps.analyze.outputs.risk_tier }}
  compliance_percentage:
    description: "Compliance score from check summary (0-100)"
    value: ${{ steps.analyze.outputs.compliance_percentage }}
  report_path:
    description: "Path to generated compliance report"
    value: ${{ steps.report.outputs.report_path }}
  articles_applicable:
    description: "Comma-separated list of applicable EU AI Act articles"
    value: ${{ steps.analyze.outputs.articles_applicable }}
  total_requirements:
    description: "Total evaluated requirements from compliance check"
    value: ${{ steps.analyze.outputs.total_requirements }}
  compliant_count:
    description: "Compliant requirement count"
    value: ${{ steps.analyze.outputs.compliant_count }}
  non_compliant_count:
    description: "Non-compliant requirement count"
    value: ${{ steps.analyze.outputs.non_compliant_count }}
  partial_count:
    description: "Partially compliant requirement count"
    value: ${{ steps.analyze.outputs.partial_count }}
  not_assessed_count:
    description: "Not-assessed requirement count"
    value: ${{ steps.analyze.outputs.not_assessed_count }}
  security_non_compliant_count:
    description: "Non-compliant OWASP control count from security summary"
    value: ${{ steps.analyze.outputs.security_non_compliant_count }}
  security_gate_failed:
    description: "Security gate failure flag (true/false)"
    value: ${{ steps.analyze.outputs.security_gate_failed }}

runs:
  using: "composite"
  steps:
    - name: "Set up Python"
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: "Install compliance kit from action source"
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir "$GITHUB_ACTION_PATH"

    - name: "Classify and check system"
      id: analyze
      shell: bash
      run: |
        ai-act classify "${{ inputs.system_yaml }}" --json > /tmp/classification.json
        ai-act check "${{ inputs.system_yaml }}" --json > /tmp/check.json

        SECURITY_GATE_MODE="${{ inputs.security_gate_mode }}" python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os
        import pathlib

        classification = json.loads(pathlib.Path("/tmp/classification.json").read_text())
        check = json.loads(pathlib.Path("/tmp/check.json").read_text())
        summary = check.get("summary", {}) or {}
        security_summary = check.get("security_summary", {}) or {}
        security_non_compliant_count = int(security_summary.get("non_compliant_count", 0))
        security_gate_mode = str(os.environ.get("SECURITY_GATE_MODE", "observe")).strip().lower()
        security_gate_failed = (
            security_gate_mode == "enforce" and security_non_compliant_count > 0
        )

        print(f"risk_tier={classification.get('risk_tier', '')}")
        print(f"articles_applicable={', '.join(classification.get('articles_applicable', []))}")
        print(f"compliance_percentage={summary.get('compliance_percentage', 0)}")
        print(f"total_requirements={int(summary.get('total_requirements', 0))}")
        print(f"compliant_count={int(summary.get('compliant_count', 0))}")
        print(f"non_compliant_count={int(summary.get('non_compliant_count', 0))}")
        print(f"partial_count={int(summary.get('partial_count', 0))}")
        print(f"not_assessed_count={int(summary.get('not_assessed_count', 0))}")
        print(f"security_non_compliant_count={security_non_compliant_count}")
        print(f"security_gate_failed={'true' if security_gate_failed else 'false'}")
        PY

    - name: "Generate report"
      id: report
      shell: bash
      run: |
        ai-act report "${{ inputs.system_yaml }}" \
          --format "${{ inputs.report_format }}" \
          --output "${{ inputs.report_path }}"
        echo "report_path=${{ inputs.report_path }}" >> "$GITHUB_OUTPUT"

    - name: "Post PR comment"
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const classification = JSON.parse(fs.readFileSync('/tmp/classification.json', 'utf8'));
          const check = JSON.parse(fs.readFileSync('/tmp/check.json', 'utf8'));
          const summary = check.summary || {};

          const tierEmoji = {
            unacceptable: '🚫',
            high_risk: '⚠️',
            limited: '⚡',
            minimal: '✅'
          };

          const comment = `## 🤖 EU AI Act Compliance Check

          **Risk Tier**: ${tierEmoji[classification.risk_tier] || 'ℹ️'} **${classification.risk_tier.toUpperCase()}**

          **Compliance Score**: ${(Number(summary.compliance_percentage || 0)).toFixed(2)}%

          **Findings Summary**:
          - Non-compliant: ${summary.non_compliant_count || 0}
          - Partial: ${summary.partial_count || 0}
          - Not assessed: ${summary.not_assessed_count || 0}

          **Applicable Articles**:
          ${(classification.articles_applicable || []).map(a => `- ${a}`).join('\n')}

          **Reasoning**:
          > ${classification.reasoning}

          [View Full Report](${{ steps.report.outputs.report_path }})

          ---
          *This is an automated compliance assessment. Professional legal review is recommended.*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: "Apply compliance gate policy"
      shell: bash
      run: |
        RISK_TIER="${{ steps.analyze.outputs.risk_tier }}"
        NON_COMPLIANT_COUNT="${{ steps.analyze.outputs.non_compliant_count }}"
        SECURITY_GATE_MODE="$(echo '${{ inputs.security_gate_mode }}' | tr '[:upper:]' '[:lower:]')"
        SECURITY_NON_COMPLIANT_COUNT="${{ steps.analyze.outputs.security_non_compliant_count }}"

        if [[ "$RISK_TIER" == "unacceptable" ]]; then
          echo "❌ Workflow failed: System classified as UNACCEPTABLE"
          echo "   Unacceptable systems are always blocked."
          exit 1
        fi

        if [[ "${{ inputs.fail_on_high_risk }}" == "true" && "$RISK_TIER" == "high_risk" && "$NON_COMPLIANT_COUNT" -gt 0 ]]; then
          echo "❌ Workflow failed: High-risk system has non-compliant requirements (${NON_COMPLIANT_COUNT})"
          echo "   Address non-compliant findings before merging."
          exit 1
        fi

        if [[ "$SECURITY_GATE_MODE" != "observe" && "$SECURITY_GATE_MODE" != "enforce" ]]; then
          echo "❌ Invalid security gate mode: $SECURITY_GATE_MODE (expected observe or enforce)"
          exit 1
        fi

        if [[ "$SECURITY_GATE_MODE" == "enforce" && "$SECURITY_NON_COMPLIANT_COUNT" -gt 0 ]]; then
          echo "❌ Workflow failed: Security gate enforced with non-compliant controls (${SECURITY_NON_COMPLIANT_COUNT})"
          echo "   Address security-mapped non-compliant findings before merging."
          exit 1
        fi

        echo "✅ Compliance gate passed"

branding:
  icon: "shield"
  color: "blue"
