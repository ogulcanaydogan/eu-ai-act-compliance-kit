name: "EU AI Act Compliance Check"
description: "Automated compliance assessment for EU AI Act (2024/1689)"

inputs:
  system_yaml:
    description: "Path to AI system descriptor YAML file"
    required: true
  fail_on_high_risk:
    description: "Fail workflow when high-risk systems have non-compliant requirements"
    required: false
    default: "false"
  security_gate_mode:
    description: "Security gate mode (observe or enforce)"
    required: false
    default: "observe"
  security_gate_profile:
    description: "Security gate profile (strict, balanced, lenient)"
    required: false
    default: "balanced"
  export_ops_gate_mode:
    description: "Export ops gate mode (observe or enforce)"
    required: false
    default: "observe"
  export_ops_gate_target:
    description: "Export ops gate target (jira or servicenow)"
    required: false
    default: "jira"
  export_ops_gate_policy_path:
    description: "Path to export ops gate policy file, relative to action root unless absolute"
    required: false
    default: "config/export_ops_gate_policy.yaml"
  export_ops_ops_path:
    description: "Path to export ops log JSONL used by export gate"
    required: false
    default: ".eu_ai_act/export_ops_log.jsonl"
  export_ops_reconcile_log_path:
    description: "Path to export reconcile log JSONL used by export gate"
    required: false
    default: ".eu_ai_act/export_reconcile_log.jsonl"
  report_format:
    description: "Report output format (json, md, html)"
    required: false
    default: "json"
  report_path:
    description: "Path to save generated report"
    required: false
    default: "compliance_report.json"

outputs:
  risk_tier:
    description: "Assigned risk tier (minimal, limited, high_risk, unacceptable)"
    value: ${{ steps.analyze.outputs.risk_tier }}
  compliance_percentage:
    description: "Compliance score from check summary (0-100)"
    value: ${{ steps.analyze.outputs.compliance_percentage }}
  report_path:
    description: "Path to generated compliance report"
    value: ${{ steps.report.outputs.report_path }}
  articles_applicable:
    description: "Comma-separated list of applicable EU AI Act articles"
    value: ${{ steps.analyze.outputs.articles_applicable }}
  total_requirements:
    description: "Total evaluated requirements from compliance check"
    value: ${{ steps.analyze.outputs.total_requirements }}
  compliant_count:
    description: "Compliant requirement count"
    value: ${{ steps.analyze.outputs.compliant_count }}
  non_compliant_count:
    description: "Non-compliant requirement count"
    value: ${{ steps.analyze.outputs.non_compliant_count }}
  partial_count:
    description: "Partially compliant requirement count"
    value: ${{ steps.analyze.outputs.partial_count }}
  not_assessed_count:
    description: "Not-assessed requirement count"
    value: ${{ steps.analyze.outputs.not_assessed_count }}
  security_non_compliant_count:
    description: "Non-compliant OWASP control count from security summary"
    value: ${{ steps.analyze.outputs.security_non_compliant_count }}
  security_partial_count:
    description: "Partial OWASP control count from security summary"
    value: ${{ steps.analyze.outputs.security_partial_count }}
  security_not_assessed_count:
    description: "Not-assessed OWASP control count from security summary"
    value: ${{ steps.analyze.outputs.security_not_assessed_count }}
  security_gate_failed:
    description: "Security gate failure flag (true/false)"
    value: ${{ steps.analyze.outputs.security_gate_failed }}
  export_ops_gate_failed:
    description: "Export ops gate failure flag (true/false)"
    value: ${{ steps.analyze.outputs.export_ops_gate_failed }}
  export_ops_gate_reason_codes:
    description: "Comma-separated export ops gate reason codes"
    value: ${{ steps.analyze.outputs.export_ops_gate_reason_codes }}
  export_ops_open_failures_count:
    description: "Open failures count seen by export ops gate"
    value: ${{ steps.analyze.outputs.export_ops_open_failures_count }}
  export_ops_drift_count:
    description: "Drift count seen by export ops gate"
    value: ${{ steps.analyze.outputs.export_ops_drift_count }}
  export_ops_success_rate:
    description: "Success rate seen by export ops gate"
    value: ${{ steps.analyze.outputs.export_ops_success_rate }}
  export_ops_gate_exit_code:
    description: "Raw exit code from export ops gate command execution"
    value: ${{ steps.analyze.outputs.export_ops_gate_exit_code }}

runs:
  using: "composite"
  steps:
    - name: "Set up Python"
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: "Install compliance kit from action source"
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir "$GITHUB_ACTION_PATH"

    - name: "Classify and check system"
      id: analyze
      shell: bash
      run: |
        ai-act classify "${{ inputs.system_yaml }}" --json > /tmp/classification.json
        ai-act check "${{ inputs.system_yaml }}" --json > /tmp/check.json
        EXPORT_OPS_POLICY_INPUT="${{ inputs.export_ops_gate_policy_path }}"
        if [[ "$EXPORT_OPS_POLICY_INPUT" = /* ]]; then
          EXPORT_OPS_POLICY_PATH="$EXPORT_OPS_POLICY_INPUT"
        else
          EXPORT_OPS_POLICY_PATH="$GITHUB_ACTION_PATH/$EXPORT_OPS_POLICY_INPUT"
        fi
        EXPORT_OPS_POLICY_ARGS=()
        if [[ -f "$EXPORT_OPS_POLICY_PATH" ]]; then
          EXPORT_OPS_POLICY_ARGS=(--policy "$EXPORT_OPS_POLICY_PATH")
        else
          echo "Warning: Export ops policy file not found: $EXPORT_OPS_POLICY_PATH"
        fi

        set +e
        ai-act export gate \
          --target "${{ inputs.export_ops_gate_target }}" \
          --mode "${{ inputs.export_ops_gate_mode }}" \
          --ops-path "${{ inputs.export_ops_ops_path }}" \
          --reconcile-log-path "${{ inputs.export_ops_reconcile_log_path }}" \
          "${EXPORT_OPS_POLICY_ARGS[@]}" \
          --json > /tmp/export_ops_gate.json
        EXPORT_OPS_GATE_EXIT_CODE=$?
        set -e
        echo "export_ops_gate_exit_code=$EXPORT_OPS_GATE_EXIT_CODE" >> "$GITHUB_OUTPUT"

        SECURITY_GATE_MODE="${{ inputs.security_gate_mode }}" SECURITY_GATE_PROFILE="${{ inputs.security_gate_profile }}" python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os
        import pathlib

        from eu_ai_act.security_gate import SecurityGateEvaluator

        classification = json.loads(pathlib.Path("/tmp/classification.json").read_text())
        check = json.loads(pathlib.Path("/tmp/check.json").read_text())
        summary = check.get("summary", {}) or {}
        security_summary = check.get("security_summary", {}) or {}
        security_gate_mode = str(os.environ.get("SECURITY_GATE_MODE", "observe")).strip().lower()
        security_gate_profile = str(
            os.environ.get("SECURITY_GATE_PROFILE", "balanced")
        ).strip().lower()

        gate_result = SecurityGateEvaluator().evaluate(
            security_summary=security_summary,
            mode=security_gate_mode,
            profile=security_gate_profile,
            risk_tier=classification.get("risk_tier"),
        )
        security_non_compliant_count = gate_result.non_compliant_count
        security_partial_count = gate_result.partial_count
        security_not_assessed_count = gate_result.not_assessed_count
        security_gate_failed = gate_result.failed
        try:
            export_ops_gate = json.loads(pathlib.Path("/tmp/export_ops_gate.json").read_text())
        except Exception:
            export_ops_gate = {}
        if not isinstance(export_ops_gate, dict):
            export_ops_gate = {}
        rollup_metrics = export_ops_gate.get("rollup_metrics", {}) or {}
        reconcile_metrics = export_ops_gate.get("reconcile_metrics", {}) or {}
        reason_codes = export_ops_gate.get("reason_codes", [])
        if not isinstance(reason_codes, list):
            reason_codes = []
        export_ops_gate_mode = str(export_ops_gate.get("mode", "observe")).strip().lower()
        export_ops_gate_failed = bool(export_ops_gate.get("failed", False))
        export_ops_gate_reason_codes = ",".join(str(code) for code in reason_codes if str(code))
        export_ops_open_failures_count = int(rollup_metrics.get("open_failures_count", 0) or 0)
        export_ops_success_rate = float(rollup_metrics.get("success_rate", 0.0) or 0.0)
        export_ops_drift_count = int(reconcile_metrics.get("drift_count", 0) or 0)

        print(f"risk_tier={classification.get('risk_tier', '')}")
        print(f"articles_applicable={', '.join(classification.get('articles_applicable', []))}")
        print(f"compliance_percentage={summary.get('compliance_percentage', 0)}")
        print(f"total_requirements={int(summary.get('total_requirements', 0))}")
        print(f"compliant_count={int(summary.get('compliant_count', 0))}")
        print(f"non_compliant_count={int(summary.get('non_compliant_count', 0))}")
        print(f"partial_count={int(summary.get('partial_count', 0))}")
        print(f"not_assessed_count={int(summary.get('not_assessed_count', 0))}")
        print(f"security_non_compliant_count={security_non_compliant_count}")
        print(f"security_partial_count={security_partial_count}")
        print(f"security_not_assessed_count={security_not_assessed_count}")
        print(f"security_gate_mode={gate_result.mode}")
        print(f"security_gate_profile={gate_result.profile}")
        print(f"security_gate_failed={'true' if security_gate_failed else 'false'}")
        print(f"security_gate_reason={gate_result.reason}")
        print(f"security_gate_effective_profile={gate_result.effective_profile}")
        print(f"export_ops_gate_mode={export_ops_gate_mode}")
        print(f"export_ops_gate_failed={'true' if export_ops_gate_failed else 'false'}")
        print(f"export_ops_gate_reason_codes={export_ops_gate_reason_codes}")
        print(f"export_ops_open_failures_count={export_ops_open_failures_count}")
        print(f"export_ops_drift_count={export_ops_drift_count}")
        print(f"export_ops_success_rate={export_ops_success_rate}")
        PY

    - name: "Generate report"
      id: report
      shell: bash
      run: |
        ai-act report "${{ inputs.system_yaml }}" \
          --format "${{ inputs.report_format }}" \
          --output "${{ inputs.report_path }}"
        echo "report_path=${{ inputs.report_path }}" >> "$GITHUB_OUTPUT"

    - name: "Post PR comment"
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const classification = JSON.parse(fs.readFileSync('/tmp/classification.json', 'utf8'));
          const check = JSON.parse(fs.readFileSync('/tmp/check.json', 'utf8'));
          const summary = check.summary || {};

          const tierEmoji = {
            unacceptable: '🚫',
            high_risk: '⚠️',
            limited: '⚡',
            minimal: '✅'
          };

          const comment = `## 🤖 EU AI Act Compliance Check

          **Risk Tier**: ${tierEmoji[classification.risk_tier] || 'ℹ️'} **${classification.risk_tier.toUpperCase()}**

          **Compliance Score**: ${(Number(summary.compliance_percentage || 0)).toFixed(2)}%

          **Findings Summary**:
          - Non-compliant: ${summary.non_compliant_count || 0}
          - Partial: ${summary.partial_count || 0}
          - Not assessed: ${summary.not_assessed_count || 0}

          **Applicable Articles**:
          ${(classification.articles_applicable || []).map(a => `- ${a}`).join('\n')}

          **Reasoning**:
          > ${classification.reasoning}

          [View Full Report](${{ steps.report.outputs.report_path }})

          ---
          *This is an automated compliance assessment. Professional legal review is recommended.*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: "Apply compliance gate policy"
      shell: bash
      run: |
        RISK_TIER="${{ steps.analyze.outputs.risk_tier }}"
        NON_COMPLIANT_COUNT="${{ steps.analyze.outputs.non_compliant_count }}"
        SECURITY_GATE_MODE="${{ steps.analyze.outputs.security_gate_mode }}"
        SECURITY_NON_COMPLIANT_COUNT="${{ steps.analyze.outputs.security_non_compliant_count }}"
        SECURITY_GATE_FAILED="${{ steps.analyze.outputs.security_gate_failed }}"
        SECURITY_GATE_REASON="${{ steps.analyze.outputs.security_gate_reason }}"
        SECURITY_GATE_EFFECTIVE_PROFILE="${{ steps.analyze.outputs.security_gate_effective_profile }}"
        EXPORT_OPS_GATE_MODE="${{ steps.analyze.outputs.export_ops_gate_mode }}"
        EXPORT_OPS_GATE_FAILED="${{ steps.analyze.outputs.export_ops_gate_failed }}"
        EXPORT_OPS_GATE_EXIT_CODE="${{ steps.analyze.outputs.export_ops_gate_exit_code }}"
        EXPORT_OPS_GATE_REASON_CODES="${{ steps.analyze.outputs.export_ops_gate_reason_codes }}"
        EXPORT_OPS_OPEN_FAILURES_COUNT="${{ steps.analyze.outputs.export_ops_open_failures_count }}"
        EXPORT_OPS_DRIFT_COUNT="${{ steps.analyze.outputs.export_ops_drift_count }}"
        EXPORT_OPS_SUCCESS_RATE="${{ steps.analyze.outputs.export_ops_success_rate }}"

        if [[ "$RISK_TIER" == "unacceptable" ]]; then
          echo "❌ Workflow failed: System classified as UNACCEPTABLE"
          echo "   Unacceptable systems are always blocked."
          exit 1
        fi

        if [[ "${{ inputs.fail_on_high_risk }}" == "true" && "$RISK_TIER" == "high_risk" && "$NON_COMPLIANT_COUNT" -gt 0 ]]; then
          echo "❌ Workflow failed: High-risk system has non-compliant requirements (${NON_COMPLIANT_COUNT})"
          echo "   Address non-compliant findings before merging."
          exit 1
        fi

        if [[ "$SECURITY_GATE_FAILED" == "true" ]]; then
          echo "❌ Workflow failed: Security gate policy blocked this run"
          echo "   mode=$SECURITY_GATE_MODE effective_profile=$SECURITY_GATE_EFFECTIVE_PROFILE reason=$SECURITY_GATE_REASON"
          echo "   non_compliant_controls=$SECURITY_NON_COMPLIANT_COUNT"
          echo "   Address security-mapped findings before merging."
          exit 1
        fi

        if [[ "$EXPORT_OPS_GATE_MODE" == "enforce" && ( "$EXPORT_OPS_GATE_FAILED" == "true" || "$EXPORT_OPS_GATE_EXIT_CODE" != "0" ) ]]; then
          echo "❌ Workflow failed: Export ops gate policy blocked this run"
          echo "   mode=$EXPORT_OPS_GATE_MODE exit_code=$EXPORT_OPS_GATE_EXIT_CODE reason_codes=$EXPORT_OPS_GATE_REASON_CODES"
          echo "   open_failures=$EXPORT_OPS_OPEN_FAILURES_COUNT drift=$EXPORT_OPS_DRIFT_COUNT success_rate=$EXPORT_OPS_SUCCESS_RATE"
          echo "   Address export operational governance findings before merging."
          exit 1
        fi

        echo "✅ Compliance gate passed"

branding:
  icon: "shield"
  color: "blue"
